<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="Quiz.css">
</head>

<body>
    <header class="banner_header">
        <div class="search_header">
            <div class="search_bar">
                <form>
                    <input type="search" class="search_input">
                    <button type="submit" class="search_submit">
                        <img src="search_img.png" alt="Search Icon">
                    </button>
                </form>
            </div>
        </div>

        <div class="logo_header">
            <h1 class="website_name">BAYAN-IKI</h1>   
            <img src="baybayin_img.png" class="baybayin_logo" alt="Baybayin Logo">
            <img src="phflag_img.png" class="phflag_logo" alt="Philippine Flag Logo">
        </div>

        <div class="tabs_header">
            <nav class="tabs">
                <a href="Home.html" class="tab_link">Home</a>
                <a href="Home.html#gallery" class="tab_link">Gallery</a>
                <a href="Quiz.html" class="tab_link active">Quiz</a>
                <a href="About_us.html" class="tab_link">About Us</a>
            </nav>
        </div>
    </header>

    <div class="quiz-menu">
        <div class="Title">
            <h1>Spanish Era</h1>
        </div>
    </div>

    <div class="app">
        <h1>Mini Pop Quiz</h1>
        <form class="quiz-form" action="SubmitResult.html" method="get">
            <div class="quiz">
                <h2>1. When did the Spanish colonization of the Philippines begin?</h2>

                <label class="option">
                    <input type="radio" name="q4" required> 1521
                </label>

                <label class="option">
                    <input type="radio" name="q4"> 1565
                </label>

                <label class="option">
                    <input type="radio" name="q4"> 1898
                </label>

                <label class="option">
                    <input type="radio" name="q4"> 1946
                </label>
            </div>

            <div class="quiz">
                <h2>2. Who was the first Spanish governor-general in the Philippines?</h2>

                <label class="option">
                    <input type="radio" name="q5" required> Miguel López de Legazpi
                </label>

                <label class="option">
                    <input type="radio" name="q5"> Ferdinand Magellan
                </label>

                <label class="option">
                    <input type="radio" name="q5"> José Rizal
                </label>

                <label class="option">
                    <input type="radio" name="q5"> Andres Bonifacio
                </label>
            </div>

            <div class="quiz">
                <h2>3. What was the main religion introduced by the Spaniards?</h2>

                <label class="option">
                    <input type="radio" name="q6" required> Islam
                </label>

                <label class="option">
                    <input type="radio" name="q6"> Buddhism
                </label>

                <label class="option">
                    <input type="radio" name="q6"> Christianity
                </label>

                <label class="option">
                    <input type="radio" name="q6"> Hinduism
                </label>
            </div>

            <div class="btn-container">
                <button class="submit-btn">Submit</button>
            </div>

        </form>
    </div>
</body>

<footer>    

</footer>
</html>
