<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="Quiz.css">
</head>

<body>
    <header class="banner_header">
        <div class="search_header">
            <div class="search_bar">
                <form>
                    <input type="search" class="search_input" placeholder="Search...">
                    <button type="submit" class="search_submit">
                        <img src="search_img.png" alt="Search Icon">
                    </button>
                </form>
            </div>
        </div>

        <div class="logo_header">
            <h1 class="website_name">BAYAN-IKI</h1>   
            <img src="baybayin_img.png" class="baybayin_logo" alt="Baybayin Logo">
            <img src="phflag_img.png" class="phflag_logo" alt="Philippine Flag Logo">
        </div>

        <div class="tabs_header">
            <nav class="tabs">
                <a href="index.html" class="tab_link">Home</a>
                <a href="Home.html#gallery" class="tab_link">Gallery</a>
                <a href="Quiz.html" class="tab_link active">Quiz</a>
                <a href="About_us.html" class="tab_link">About Us</a>
            </nav>
        </div>
    </header>

    <div class="quiz-menu">

    <div class="Title">
        <h1>American Era</h1>
    </div>
    <div class="app">
        <h1>Mini Pop Quiz</h1>
        <form class="quiz-form" action="SubmitResult.html" method="get">
            <div class="quiz">
                <h2>1. When did American colonization of the Philippines begin?</h2>

                <label class="option">
                    <input type="radio" name="q1" required> 1898
                </label>

                <label class="option">
                    <input type="radio" name="q1"> 1565
                </label>

                <label class="option">
                    <input type="radio" name="q1"> 1946
                </label>

                <label class="option">
                    <input type="radio" name="q1"> 1521
                </label>
            </div>

            <div class="quiz">
                <h2>2. What event marked the start of American rule in the Philippines?</h2>

                <label class="option">
                    <input type="radio" name="q2" required> Philippine Revolution
                </label>

                <label class="option">
                    <input type="radio" name="q2"> Spanish-American War
                </label>

                <label class="option">
                    <input type="radio" name="q2"> World War I
                </label>

                <label class="option">
                    <input type="radio" name="q2"> EDSA Revolution
                </label>
            </div>

            <div class="quiz">
                <h2>3. What was one major contribution of the Americans in the Philippines?</h2>

                <label class="option">
                    <input type="radio" name="q3" required> Introduction of public education system
                </label>

                <label class="option">
                    <input type="radio" name="q3"> Building of barangays
                </label>

                <label class="option">
                    <input type="radio" name="q3"> Spread of Islam
                </label>

                <label class="option">
                    <input type="radio" name="q3"> Establishment of encomienda system
                </label>
            </div>

            <div class="btn-container">
                <button class="submit-btn">Submit</button>
            </div>
            
        </form>
    </div>
</body>

<footer>    

</footer>
</html>
